####################
### WINDOW RULES ###
####################

# Floating windows: default size + auto-center on Super+V toggle.
# Sourced after 20-binds.conf so these override the 1800×980 tiling sizes.
# Pinned windows (PiP) are excluded — they have intentional positions.
windowrulev2 = size 1100 700, floating:1, pinned:0
windowrulev2 = center,        floating:1, pinned:0

# Obsidian — compositor transparency + blur (WM class is "electron", filter by title)
windowrulev2 = opacity 0.85 0.80, class:^(electron)$, title:.*Obsidian.*

# Vesktop — compositor transparency + blur
windowrulev2 = opacity 0.85 0.80, class:^(vesktop)$

# Evince (PDF viewer) — compositor transparency + blur
windowrulev2 = opacity 0.75 0.70, class:^(org.gnome.Evince)$

# Nautilus (file manager) — compositor transparency + blur
windowrulev2 = opacity 0.75 0.70, class:^(org.gnome.Nautilus)$

# Editors — compositor transparency + blur
windowrulev2 = opacity 0.75 0.70, class:^(cursor)$
windowrulev2 = opacity 0.75 0.70, class:^(vscodium)$
windowrulev2 = opacity 0.75 0.70, class:^(libreoffice.*)$

# Messaging — compositor transparency + blur
windowrulev2 = opacity 0.75 0.70, class:^(slack)$
windowrulev2 = opacity 0.75 0.70, class:^(element)$
